<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="사물인터넷과 센서 제어 수업을 위한 실습 시뮬레이터 모음">
  <title>사물인터넷과 센서 제어 | 실습 시뮬레이터</title>
  <style>
    :root { --ink:#10233f; --muted:#64748b; --line:#dbe5ef; --blue:#2563eb; --mint:#14b8a6; --bg:#f4f8fc; --card:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:var(--bg); font-family:Pretendard,"Noto Sans KR","Segoe UI",sans-serif; line-height:1.6; }
    header { background:linear-gradient(135deg,#173b74,#2563eb 64%,#14b8a6); color:#fff; }
    .wrap { width:min(1080px,calc(100% - 32px)); margin:auto; }
    .hero { padding:70px 0 64px; }
    .eyebrow { margin:0 0 10px; font-size:14px; letter-spacing:.08em; opacity:.85; }
    h1 { margin:0; font-size:clamp(32px,5vw,52px); line-height:1.18; }
    .lead { max-width:650px; margin:18px 0 0; font-size:18px; opacity:.9; }
    main { padding:48px 0 80px; }
    .section-head { display:flex; justify-content:space-between; gap:16px; align-items:end; margin-bottom:18px; }
    h2 { margin:0; font-size:25px; }
    .section-head p { margin:0; color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:18px; }
    .card { display:flex; flex-direction:column; min-height:265px; padding:24px; color:inherit; background:var(--card); border:1px solid var(--line); border-radius:18px; text-decoration:none; box-shadow:0 10px 30px rgba(15,35,65,.06); transition:.2s ease; }
    .card:hover { transform:translateY(-4px); border-color:#93b4ef; box-shadow:0 15px 34px rgba(37,99,235,.12); }
    .icon { display:grid; place-items:center; width:52px; height:52px; border-radius:14px; color:#fff; background:linear-gradient(135deg,var(--blue),var(--mint)); font-size:25px; }
    .card h3 { margin:22px 0 8px; font-size:21px; }
    .card p { margin:0; color:var(--muted); }
    .tag { display:inline-block; width:max-content; margin-top:16px; padding:4px 10px; border-radius:999px; background:#e8f0ff; color:#1d4ed8; font-size:13px; }
    .go { margin-top:auto; padding-top:20px; color:var(--blue); font-weight:700; }
    .planned { opacity:.62; pointer-events:none; }
    footer { padding:26px 0; color:var(--muted); border-top:1px solid var(--line); text-align:center; }
    @media (max-width:640px) { .hero{padding:52px 0 48px}.section-head{display:block}.section-head p{margin-top:6px} }
  </style>
</head>
<body>
  <header>
    <div class="wrap hero">
      <p class="eyebrow">2022 개정 교육과정 · 체험형 학습 자료</p>
      <h1>사물인터넷과 센서 제어<br>실습 시뮬레이터</h1>
      <p class="lead">눈에 보이지 않는 신호와 제어 원리를 직접 조작하며 이해하는 수업용 실습 공간입니다.</p>
    </div>
  </header>
  <main class="wrap">
    <div class="section-head">
      <h2>시뮬레이터 목록</h2>
      <p>카드를 선택해 실습을 시작하세요.</p>
    </div>
    <section class="grid" aria-label="시뮬레이터 목록">
      <a class="card" href="pwm.html">
        <span class="icon" aria-hidden="true">〽</span>
        <h3>PWM 조작 실습</h3>
        <p>듀티비와 주파수를 변경하며 파형, LED 밝기, 모터 출력의 변화를 관찰합니다.</p>
        <span class="tag">PWM · 듀티비 · 주파수</span>
        <span class="go">실습 시작 →</span>
      </a>
      <article class="card planned" aria-label="새 시뮬레이터 준비 중">
        <span class="icon" aria-hidden="true">＋</span>
        <h3>새로운 실습 추가 예정</h3>
        <p>앞으로 제작하는 센서 및 제어 시뮬레이터가 이곳에 순서대로 추가됩니다.</p>
        <span class="go">준비 중</span>
      </article>
    </section>
  </main>
  <footer><div class="wrap">사물인터넷과 센서 제어 수업 자료</div></footer>
</body>
</html>
